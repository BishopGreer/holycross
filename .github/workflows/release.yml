name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, without the leading v'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          CODE_VERSION="$(sed -n "s/^const CMS_VERSION = '\([^']*\)';$/\1/p" core/bootstrap.php)"
          if [ -z "$CODE_VERSION" ]; then
            echo "Could not read CMS_VERSION from core/bootstrap.php" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_VERSION="${{ inputs.version }}"
          else
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [ "$RELEASE_VERSION" != "$CODE_VERSION" ]; then
            echo "Release version $RELEASE_VERSION does not match CMS_VERSION $CODE_VERSION" >&2
            exit 1
          fi

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release ZIP
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="holycross-cms-$VERSION.zip"
          SHA="$ZIP.sha256"

          zip -qr "$ZIP" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "config/config.php" \
            -x "assets/uploads/*" \
            -x "releases/*" \
            -x "*.log" \
            -x ".DS_Store"

          zip -q "$ZIP" assets/uploads/.gitkeep assets/uploads/.htaccess
          shasum -a 256 "$ZIP" > "$SHA"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          ZIP="holycross-cms-$VERSION.zip"
          SHA="$ZIP.sha256"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" "$SHA" --clobber
          else
            gh release create "$TAG" "$ZIP" "$SHA" \
              --title "Holy Cross CMS $VERSION" \
              --notes "Release files for Holy Cross CMS $VERSION."
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holycross-cms-${{ steps.version.outputs.version }}
          path: |
            holycross-cms-${{ steps.version.outputs.version }}.zip
            holycross-cms-${{ steps.version.outputs.version }}.zip.sha256
